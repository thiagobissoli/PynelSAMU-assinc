<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema SAMU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-card: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: #38383a;
            --green: #34c759;
            --green-hover: #30b350;
            --red: #ff3b30;
            --blue: #007aff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        /* Grid sutil de fundo (lembra dashboard) */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-brand .icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--green);
            margin-bottom: 16px;
        }
        .login-brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .login-brand p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .login-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-card h2 i {
            color: var(--green);
        }
        .form-floating {
            margin-bottom: 16px;
        }
        .form-floating .form-control {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            height: 52px;
        }
        .form-floating .form-control::placeholder {
            color: var(--text-secondary);
        }
        .form-floating .form-control:focus {
            background: var(--bg-secondary);
            border-color: var(--green);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2);
        }
        .form-floating label {
            color: var(--text-secondary);
        }
        .form-floating .form-control:focus ~ label,
        .form-floating .form-control:not(:placeholder-shown) ~ label {
            color: var(--text-secondary);
        }
        .btn-login {
            width: 100%;
            height: 48px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            background: var(--green);
            border: none;
            color: #000;
            margin-top: 8px;
            transition: background 0.2s, transform 0.05s;
        }
        .btn-login:hover {
            background: var(--green-hover);
            color: #000;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .alert-login {
            border-radius: 10px;
            border: 1px solid;
            margin-bottom: 20px;
        }
        .alert-login.alert-danger {
            background: rgba(255, 59, 48, 0.15);
            border-color: var(--red);
            color: #ff6b6b;
        }
        .alert-login.alert-warning {
            background: rgba(255, 149, 0, 0.15);
            border-color: #ff9500;
            color: #ffb340;
        }
        .alert-login.alert-info {
            background: rgba(0, 122, 255, 0.15);
            border-color: var(--blue);
            color: #64b5f6;
        }
        .alert-login .btn-close {
            filter: invert(1);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="icon"><i class="bi bi-speedometer2"></i></div>
            <h1>Sistema SAMU</h1>
            <p>Indicadores e monitoramento</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-login alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="login-card">
            <h2><i class="bi bi-box-arrow-in-right"></i> Entrar</h2>
            <form method="post" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                           value="{{ request.form.get('username', '') }}"
                           placeholder="Usuário" required autofocus>
                    <label for="username">Usuário</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Senha" required>
                    <label for="password">Senha</label>
                </div>
                <button type="submit" class="btn btn-login">Entrar</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
